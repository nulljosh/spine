<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Summary: Joshua Trommel</title>
<link rel="preload" href="fonts/Geist-Regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/Geist-Medium.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="fonts/Geist-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="tokens.css">
<style>
@font-face { font-family:'Geist'; src:url('fonts/Geist-Regular.woff2') format('woff2'); font-weight:400; font-display:swap; }
@font-face { font-family:'Geist'; src:url('fonts/Geist-Medium.woff2') format('woff2'); font-weight:500; font-display:swap; }
@font-face { font-family:'Geist'; src:url('fonts/Geist-SemiBold.woff2') format('woff2'); font-weight:600; font-display:swap; }

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family:var(--font); font-weight:400;
  background:var(--bg); color:var(--text);
  line-height:1.6; min-height:100dvh;
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  transition:background 0.35s var(--ease), color 0.35s var(--ease);
}

/* Layout */
.page {
  display:grid;
  grid-template-columns:220px 1fr;
  grid-template-rows:auto 1fr;
  max-width:1060px;
  margin:0 auto;
  padding:clamp(2rem,6vw,4rem) clamp(1.5rem,4vw,2.5rem) 6rem;
  gap:0 3rem;
}

@media(max-width:860px) {
  .page { grid-template-columns:1fr; }
  .toc-wrap { display:none; }
}

/* Back link */
.back-link {
  grid-column:1/-1;
  display:inline-block; font-size:0.8125rem; color:var(--text3);
  text-decoration:none; margin-bottom:2.5rem;
  transition:color 0.2s;
}
.back-link:hover { color:var(--accent); }

/* Sidebar TOC */
.toc-wrap {
  grid-column:1;
  grid-row:2;
  position:relative;
}
.toc {
  position:sticky;
  top:2.5rem;
  display:flex;
  flex-direction:column;
  gap:0;
}
.toc-label {
  font-size:0.6875rem;
  font-weight:600;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:0.75rem;
}
.toc a {
  display:block;
  font-size:0.8125rem;
  color:var(--text3);
  text-decoration:none;
  padding:0.3rem 0 0.3rem 0.875rem;
  border-left:2px solid var(--border);
  line-height:1.35;
  transition:color 0.15s, border-color 0.15s;
}
.toc a:hover { color:var(--text2); }
.toc a.active {
  color:var(--accent);
  border-left-color:var(--accent);
  font-weight:500;
}

/* Mobile chapter jump */
.chapter-jump {
  display:none;
  width:100%;
  margin-bottom:1.5rem;
  padding:0.5rem 0.75rem;
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text2);
  font-family:var(--font);
  font-size:0.875rem;
  appearance:none;
  cursor:pointer;
}
@media(max-width:860px) { .chapter-jump { display:block; } }

/* Main content area */
.main {
  grid-column:2;
  grid-row:2;
  min-width:0;
}
@media(max-width:860px) { .main { grid-column:1; } }

/* Hero */
.hero {
  margin-bottom:3rem;
  padding-bottom:2rem;
  border-bottom:1px solid var(--border2);
}
h1.title {
  font-family:var(--font-display); font-style:italic;
  font-size:clamp(2rem,5vw,2.75rem); font-weight:900;
  letter-spacing:-0.02em; line-height:1.1;
  color:var(--text);
  margin-bottom:0.75rem;
}
.hero-meta {
  font-size:0.8125rem;
  color:var(--text3);
  display:flex;
  gap:1rem;
  flex-wrap:wrap;
}
.hero-meta span::before { content:'· '; }
.hero-meta span:first-child::before { content:''; }

/* Content */
#content { font-size:0.9375rem; color:var(--text2); }

#content h1, #content h2 {
  font-family:var(--font-display); font-style:italic;
  color:var(--text); line-height:1.25;
  margin-top:2.5rem; margin-bottom:0.75rem;
}
#content h1 { font-size:1.5rem; }
#content h2 {
  font-size:1.25rem;
  padding-left:0.875rem;
  border-left:3px solid var(--accent);
  margin-left:-0.875rem;
}
#content h3 {
  font-size:1rem; font-weight:600;
  color:var(--text); margin:1.5rem 0 0.5rem;
}
#content p, #content ul, #content ol { margin-bottom:1rem; }
#content ul, #content ol { padding-left:1.4rem; }
#content li { margin-bottom:0.4rem; }
#content strong { color:var(--text); font-weight:600; }
#content hr { border:none; border-top:1px solid var(--border); margin:2.5rem 0; }
#content table { width:100%; border-collapse:collapse; margin-bottom:1.5rem; font-size:0.875rem; overflow-x:auto; display:block; }
#content th, #content td { text-align:left; padding:0.5rem 0.75rem; border-bottom:1px solid var(--border2); }
#content th { color:var(--text); font-weight:600; }
#content code { background:var(--bg2); padding:0.15em 0.4em; border-radius:4px; font-size:0.875em; }
#content pre { background:var(--bg2); padding:1rem; border-radius:var(--radius-sm); overflow-x:auto; margin-bottom:1rem; }
#content blockquote { border-left:3px solid var(--border); padding-left:1rem; color:var(--text3); margin-bottom:1rem; }

.empty-state { color:var(--text3); font-size:0.9375rem; padding:2rem 0; }

footer { margin-top:4rem; padding-top:2rem; border-top:1px solid var(--border2); }
footer a { font-size:0.8125rem; color:var(--text3); text-decoration:none; }
footer a:hover { color:var(--accent); }
</style>
</head>
<body>

<div class="page">
  <a class="back-link" href="index.html">&larr; Back to rankings</a>

  <!-- Mobile chapter jump -->
  <select class="chapter-jump" id="chapter-jump" aria-label="Jump to chapter">
    <option value="">Jump to chapter…</option>
  </select>

  <!-- TOC sidebar -->
  <aside class="toc-wrap">
    <nav class="toc" id="toc">
      <div class="toc-label">Contents</div>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">
    <div class="hero">
      <h1 class="title" id="book-title">Summary</h1>
      <div class="hero-meta" id="hero-meta"></div>
    </div>
    <div id="content"><div class="empty-state">Loading&hellip;</div></div>
    <footer>
      <a href="/">heyitsmejosh.com</a>
    </footer>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(function() {
  var saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();

var params = new URLSearchParams(location.search);
var slug = params.get('b');
var titleEl = document.getElementById('book-title');
var contentEl = document.getElementById('content');
var metaEl = document.getElementById('hero-meta');
var tocEl = document.getElementById('toc');
var jumpEl = document.getElementById('chapter-jump');

function titleize(s) {
  return s.split('-').map(function(w) { return w.charAt(0).toUpperCase() + w.slice(1); }).join(' ');
}

function buildTOC() {
  var headings = contentEl.querySelectorAll('h2');
  if (!headings.length) return;

  headings.forEach(function(h, i) {
    var id = 'ch-' + i;
    h.id = id;
    var text = h.textContent;

    // TOC link
    var a = document.createElement('a');
    a.href = '#' + id;
    a.textContent = text;
    tocEl.appendChild(a);

    // Mobile select option
    var opt = document.createElement('option');
    opt.value = '#' + id;
    opt.textContent = text;
    jumpEl.appendChild(opt);
  });

  jumpEl.addEventListener('change', function() {
    if (this.value) {
      document.querySelector(this.value).scrollIntoView({behavior:'smooth'});
      this.value = '';
    }
  });

  // Scroll spy
  var links = tocEl.querySelectorAll('a');
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        links.forEach(function(l) { l.classList.remove('active'); });
        var active = tocEl.querySelector('a[href="#' + entry.target.id + '"]');
        if (active) active.classList.add('active');
      }
    });
  }, { rootMargin: '-10% 0px -80% 0px' });

  headings.forEach(function(h) { observer.observe(h); });
}

function buildMeta(md, chapterCount) {
  var words = md.trim().split(/\s+/).length;
  var mins = Math.max(1, Math.round(words / 200));
  var parts = [
    document.createTextNode(mins + ' min read'),
  ];
  if (chapterCount > 0) {
    var s = document.createElement('span');
    s.textContent = chapterCount + ' chapter' + (chapterCount !== 1 ? 's' : '');
    metaEl.appendChild(s);
  }
  var s2 = document.createElement('span');
  s2.textContent = mins + ' min read';
  metaEl.appendChild(s2);
}

if (!slug) {
  contentEl.innerHTML = '<div class="empty-state">No book specified.</div>';
} else {
  titleEl.textContent = titleize(slug);
  document.title = titleize(slug) + ' — Summary';

  fetch('summaries/' + slug + '.md')
    .then(function(res) {
      if (!res.ok) throw new Error('not found');
      return res.text();
    })
    .then(function(md) {
      contentEl.innerHTML = marked.parse(md);
      var h2s = contentEl.querySelectorAll('h2');
      buildMeta(md, h2s.length);
      buildTOC();
    })
    .catch(function() {
      contentEl.innerHTML = '<div class="empty-state">Summary coming soon.</div>';
    });
}
</script>

</body>
</html>
