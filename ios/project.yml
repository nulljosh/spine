name: BooksApp
options:
  bundleIdPrefix: com.heyitsmejosh
targets:
  BooksApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources: [BooksApp]
    info:
      path: BooksApp/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.books
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QMM486NPYC
  BooksAppMac:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources: [BooksApp]
    info:
      path: BooksApp/Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.heyitsmejosh.books.mac
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: QMM486NPYC
